<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas</title>
    <style>
        body {
           font-family: Arial, Helvetica, sans-serif; 
           text-align: center;
        }

        table {
            border-collapse: collapse;
        }

        th, td {
            border: 2px solid black;
            padding: 5px;
        }

        #head {
            background-color: gray;
            color: white;
        }

        #media {
            background-color: gray;
            color: white;
        }


    </style>
</head>
<body>
    <h1>Desafios parte 3</h1>
    <table>
        <tr id="head">
            <th rowspan="2" scope="row">Área</th>
            <th id="dis" rowspan="2" scope="row">Disciplina</th>
            <th colspan="2" scope="rowgroup">Notas</th>
            <th rowspan="2" scope="row">Média</th>
        </tr>
        <tr>
            <th id="head" scope="row">Nota 1</th>
            <th id="head" scope="row">Nota 2</th>
        </tr>
        <tr>
            <th rowspan="4" scope="colgroup">Exatas</th>
            <td>Matemática</td>
            <td>5.0</td>
            <td>5.0</td>
            <td>5.0</td>
        </tr>
        <tr>
            <td>Física</td>
            <td>5.0</td>
            <td>5.0</td>
            <td>5.0</td>
        </tr>
        <tr>
            <td>Química</td>
            <td>5.0</td>
            <td>5.0</td>
            <td>5.0</td>
        </tr>
        <tr>
            <td>Biologia</td>
            <td>5.0</td>
            <td>5.0</td>
            <td>5.0</td>
        </tr>
        <tr>
            <th id="media" colspan="4" scope="col">Média de Exatas</th>
            <td id="media">5.0</td>
        </tr>
        <tr>
            <th rowspan="2" scope="colgroup">Humanas</th>
            <td>História</td>
            <td>5.0</td>
            <td>5.0</td>
            <td>5.0</td>
        </tr>
        <tr>
            <td>Geografia</td>
            <td>5.0</td>
            <td>5.0</td>
            <td>5.0</td>
        </tr>

        <tr>
            <th id="media" colspan="4" scope="col">Médias de Humanas</th>
            <td id="media">5.0</td>
            
        </tr>
    </table>
</body>
</html>
