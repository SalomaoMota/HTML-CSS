<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        caption {
            font-weight: bold;
        }

        table {
            border-collapse: collapse;
        }

        th,td {
            border: 2px solid black;
            padding: 5px 10px;
        }

        .cnome {
            border: 3px solid greenyellow;
        }
    </style> 
</head>
<body>
    <h1>Exercícios de Tabelas</h1>
    <table>
        <colgroup>
            <col class="cnome">
            <col class="csexo">
            <col class="cidade">
            <col class="cprof">
        </colgroup>
        <caption>Cadastro</caption>
        <tr>
            <th scope="col">Nome</th>
            <th scope="col">Sexo</th>
            <th scope="col">Idade</th>
            <th scope="col">Profissão</th>
        </tr>
        <tr>
            <td>Ana Maria</td>
            <td>F</td>
            <td>25</td>
            <td>Jornalista</td>
        </tr>
        <tr>
            <td>Maria</td>
            <td>F</td>
            <td>40</td>
            <td>Jornalista</td>
        </tr>
        <tr>
            <td>Paulo</td>
            <td>M</td>
            <td>30</td>
            <td>Dentista</td>
        </tr>
        <tr>
            <td>Bruno</td>
            <td>M</td>
            <td>28</td>
            <td>Motorista</td>
        </tr>
        <tr>
            <td>Clara</td>
            <td>F</td>
            <td>38</td>
            <td>Arquitéta</td>
        </tr>
    </table>
</body>
</html>
